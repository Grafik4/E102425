<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Е102425</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Е102425">
    <meta name="application-name" content="Е102425">
    <meta name="mobile-web-app-capable" content="yes">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .time-indicator {
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 18px 16px;
            border-radius: 40px;
            font-size: clamp(18px, 5vw, 22px);
            font-weight: 700;
            text-align: center;
            color: #1a1a1a;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .info-text {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            padding: 16px;
            border-radius: 40px;
            font-size: clamp(14px, 4vw, 16px);
            text-align: center;
            color: #333;
            font-weight: 600;
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 1/1;
            background: white;
            border-radius: 50%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #ringCanvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            background: white;
        }

        .status-panel {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .indicator {
            width: 100%;
            background: white;
            padding: 18px 16px;
            border-radius: 40px;
            font-size: clamp(14px, 4vw, 16px);
            font-weight: 600;
            text-align: center;
            transition: all 0.3s ease;
        }

        @media (max-width: 380px) {
            .time-indicator { font-size: 14px; padding: 12px; }
            .info-text { font-size: 12px; padding: 10px; }
            .indicator { font-size: 12px; padding: 12px; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="timeIndicator" class="time-indicator">Загрузка...</div>
        <div id="infoText" class="info-text">Следующее вращение: понедельник 00:01 (МСК)</div>
        
        <div class="canvas-container">
            <canvas id="ringCanvas" width="800" height="800"></canvas>
        </div>
        
        <div class="status-panel">
            <div id="indicator" class="indicator">Цикл выполняется</div>
        </div>
    </div>

    <script>
        (function() {
            const canvas = document.getElementById('ringCanvas');
            const ctx = canvas.getContext('2d');
            const indicator = document.getElementById('indicator');
            const timeIndicator = document.getElementById('timeIndicator');
            const infoText = document.getElementById('infoText');
            
            function resizeCanvas() {
                const container = canvas.parentElement;
                const size = Math.min(container.clientWidth, container.clientHeight, 500);
                canvas.style.width = size + 'px';
                canvas.style.height = size + 'px';
                canvas.width = 800;
                canvas.height = 800;
            }
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            const ringThickness = 70;
            const diameter = 400;
            const radius = diameter / 2;
            
            const pos1_Inner = radius - ringThickness;
            const pos1_Outer = radius;
            const pos2_Inner = pos1_Outer;
            const pos2_Outer = pos2_Inner + ringThickness;
            const pos3_Inner = pos2_Outer;
            const pos3_Outer = pos3_Inner + ringThickness;
            const pos4_Inner = pos3_Outer;
            const pos4_Outer = pos4_Inner + ringThickness;
            
            const segmentCount = 10;
            const segmentAngle = (2 * Math.PI) / segmentCount;
            
            const COLOR_POS1 = '#CCFFCC';
            const COLOR_POS2 = '#90EE90';
            const COLOR_POS3 = '#87CEEB';
            const COLOR_POS4 = '#AFEEEE';
            
            // Исходные наборы цифр
            let currentRings = [
                { id: 0, numbers: [2, 3, 4, 9, 12, 36, 22, 25, 35, 41] },
                { id: 1, numbers: [1, 5, 6, 11, 13, 14, 16, 17, 26, 27] },
                { id: 2, numbers: [43, 32, 33, 34, 15, 37, 38, 39, 30, 4442] },
                { id: 3, numbers: [7, 10, 18, 29, 19, 24, 21, 20, 23, 8] }
            ];
            
            // Функция для обмена цифрами (остаются в своих кольцах)
            function performSwaps(ringsArray) {
                const newRings = ringsArray.map(ring => ({
                    id: ring.id,
                    numbers: [...ring.numbers]
                }));
                
                // Находим позиции нужных цифр
                const pos35 = newRings[0].numbers.indexOf(35);
                const pos27 = newRings[1].numbers.indexOf(27);
                const pos3 = newRings[0].numbers.indexOf(3);
                const pos6 = newRings[1].numbers.indexOf(6);
                const pos9 = newRings[0].numbers.indexOf(9);
                const pos26 = newRings[1].numbers.indexOf(26);
                
                // Меняем местами цифры на этих позициях (35↔27, 3↔6, 9↔26)
                if (pos35 !== -1 && pos27 !== -1) {
                    const temp = newRings[0].numbers[pos35];
                    newRings[0].numbers[pos35] = newRings[1].numbers[pos27];
                    newRings[1].numbers[pos27] = temp;
                }
                
                if (pos3 !== -1 && pos6 !== -1) {
                    const temp = newRings[0].numbers[pos3];
                    newRings[0].numbers[pos3] = newRings[1].numbers[pos6];
                    newRings[1].numbers[pos6] = temp;
                }
                
                if (pos9 !== -1 && pos26 !== -1) {
                    const temp = newRings[0].numbers[pos9];
                    newRings[0].numbers[pos9] = newRings[1].numbers[pos26];
                    newRings[1].numbers[pos26] = temp;
                }
                
                return newRings;
            }
            
            const SPEED_POS2 = 3;
            const SPEED_POS3 = 7;
            const SPEED_POS4 = 9;
            
            // Фиксированная дата начала (первый понедельник)
            const FIXED_START_DATE = new Date('2024-01-01T00:01:00+03:00');
            const MOSCOW_OFFSET = 3 * 60 * 60 * 1000;
            
            let positionToRing = [0, 1, 2, 3];
            let pos2_rotation = 0;
            let pos3_rotation = 0;
            let pos4_rotation = 0;
            let currentWeekInCycle = 0;
            let lastProcessedWeek = -1;
            let serverTimeOffset = 0;
            let isTimeSynced = false;
            let animationFrameId = null;
            
            async function syncTimeWithServer() {
                try {
                    const response = await fetch('https://worldtimeapi.org/api/timezone/Europe/Moscow');
                    if (response.ok) {
                        const data = await response.json();
                        const serverTime = new Date(data.utc_datetime).getTime();
                        const localTime = Date.now();
                        serverTimeOffset = serverTime - localTime;
                        isTimeSynced = true;
                        console.log('Время синхронизировано');
                        return true;
                    }
                } catch (e) {
                    console.log('Ошибка синхронизации, используется локальное время');
                }
                isTimeSynced = true;
                return false;
            }
            
            function getPreciseMoscowTime() {
                const now = new Date(Date.now() + serverTimeOffset);
                return new Date(now.getTime() + MOSCOW_OFFSET);
            }
            
            function getCurrentMondayMoscow() {
                const moscowTime = getPreciseMoscowTime();
                const day = moscowTime.getUTCDay();
                const diff = day === 0 ? 6 : day - 1;
                
                const monday = new Date(moscowTime);
                monday.setUTCDate(moscowTime.getUTCDate() - diff);
                monday.setUTCHours(0, 1, 0, 0);
                
                return new Date(monday.getTime() - MOSCOW_OFFSET);
            }
            
            function getNextMondayMoscow() {
                const moscowTime = getPreciseMoscowTime();
                const day = moscowTime.getUTCDay();
                const diff = day === 0 ? 6 : day - 1;
                const daysToAdd = diff === 0 ? 7 : 7 - diff;
                
                const nextMonday = new Date(moscowTime);
                nextMonday.setUTCDate(moscowTime.getUTCDate() + daysToAdd);
                nextMonday.setUTCHours(0, 1, 0, 0);
                
                return new Date(nextMonday.getTime() - MOSCOW_OFFSET);
            }
            
            function getWeeksBetween(startDate, endDate) {
                const msPerWeek = 7 * 24 * 60 * 60 * 1000;
                return Math.floor((endDate - startDate) / msPerWeek);
            }
            
            function formatMoscowTime(date) {
                const moscowTime = new Date(date.getTime() + MOSCOW_OFFSET);
                const day = String(moscowTime.getUTCDate()).padStart(2, '0');
                const month = String(moscowTime.getUTCMonth() + 1).padStart(2, '0');
                const hours = String(moscowTime.getUTCHours()).padStart(2, '0');
                const minutes = String(moscowTime.getUTCMinutes()).padStart(2, '0');
                const weekdays = ['вс', 'пн', 'вт', 'ср', 'чт', 'пт', 'сб'];
                return `${weekdays[moscowTime.getUTCDay()]}, ${day}.${month} ${hours}:${minutes}`;
            }
            
            function updateStateFromRealTime() {
                const currentMonday = getCurrentMondayMoscow();
                const weeksSinceStart = getWeeksBetween(FIXED_START_DATE, currentMonday);
                
                currentWeekInCycle = weeksSinceStart % 10;
                
                // Рассчитываем углы поворота
                pos2_rotation = (weeksSinceStart * SPEED_POS2 * segmentAngle) % (2 * Math.PI);
                pos3_rotation = (weeksSinceStart * SPEED_POS3 * segmentAngle) % (2 * Math.PI);
                pos4_rotation = (weeksSinceStart * SPEED_POS4 * segmentAngle) % (2 * Math.PI);
                
                // Меняем местами кольца в позициях 1 и 2 каждую неделю
                const swaps = weeksSinceStart;
                positionToRing = (swaps % 2 === 0) ? [0, 1, 2, 3] : [1, 0, 2, 3];
                
                // Выполняем обмен цифрами при каждом новом вращении (каждую новую неделю)
                if (weeksSinceStart !== lastProcessedWeek) {
                    currentRings = performSwaps(currentRings);
                    lastProcessedWeek = weeksSinceStart;
                    console.log(`Обмен цифр выполнен на неделе ${currentWeekInCycle + 1}`);
                }
            }
            
            function updateIndicators() {
                const moscowTime = getPreciseMoscowTime();
                const hours = String(moscowTime.getUTCHours()).padStart(2, '0');
                const minutes = String(moscowTime.getUTCMinutes()).padStart(2, '0');
                const seconds = String(moscowTime.getUTCSeconds()).padStart(2, '0');
                const weekdays = ['воскресенье', 'понедельник', 'вторник', 'среда', 'четверг', 'пятница', 'суббота'];
                timeIndicator.textContent = `${weekdays[moscowTime.getUTCDay()]}, ${hours}:${minutes}:${seconds}`;
                
                const nextMonday = getNextMondayMoscow();
                const nextStr = formatMoscowTime(nextMonday);
                infoText.textContent = `Следующее вращение: ${nextStr} (МСК)`;
                
                if (currentWeekInCycle >= 7) {
                    indicator.textContent = '⚠️ Цикл подходит к концу';
                    indicator.style.backgroundColor = '#FF5252';
                    indicator.style.color = 'white';
                } else {
                    indicator.textContent = '✓ Цикл выполняется';
                    indicator.style.backgroundColor = 'white';
                    indicator.style.color = '#333';
                }
            }
            
            function drawRingSegment(startAngle, endAngle, innerR, outerR, color, rotation = 0) {
                ctx.beginPath();
                const rotatedStart = startAngle + rotation;
                const rotatedEnd = endAngle + rotation;
                
                ctx.arc(centerX, centerY, outerR, rotatedStart, rotatedEnd);
                ctx.lineTo(
                    centerX + innerR * Math.cos(rotatedEnd),
                    centerY + innerR * Math.sin(rotatedEnd)
                );
                ctx.arc(centerX, centerY, innerR, rotatedEnd, rotatedStart, true);
                ctx.closePath();
                
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            function drawNumberInSegment(number, segmentIndex, radiusPos, rotation = 0) {
                const angle = segmentIndex * segmentAngle + segmentAngle / 2 + rotation;
                const x = centerX + radiusPos * Math.cos(angle);
                const y = centerY + radiusPos * Math.sin(angle);
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle + Math.PI / 2);
                
                ctx.fillStyle = '#000';
                ctx.font = 'bold 24px -apple-system, BlinkMacSystemFont, Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let displayText;
                if (Number.isInteger(number)) {
                    displayText = number.toString();
                } else {
                    displayText = number.toFixed(1);
                }
                
                // Подсветка цифр, участвующих в обмене
                if (number === 35 || number === 27 || number === 3 || number === 6 || number === 9 || number === 26) {
                    ctx.fillStyle = '#FF4444';
                    ctx.fillText(displayText, 0, 0);
                } else {
                    ctx.fillText(displayText, 0, 0);
                }
                
                ctx.restore();
            }
            
            function drawCenterPoint() {
                ctx.beginPath();
                ctx.arc(centerX, centerY, 6, 0, 2 * Math.PI);
                ctx.fillStyle = '#333';
                ctx.fill();
            }
            
            function draw() {
                if (isTimeSynced) {
                    updateStateFromRealTime();
                    updateIndicators();
                }
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const ring4 = currentRings[positionToRing[3]];
                for (let i = 0; i < segmentCount; i++) {
                    drawRingSegment(i * segmentAngle, (i + 1) * segmentAngle, pos4_Inner, pos4_Outer, COLOR_POS4, pos4_rotation);
                    drawNumberInSegment(ring4.numbers[i], i, pos4_Inner + ringThickness / 2, pos4_rotation);
                }
                
                const ring3 = currentRings[positionToRing[2]];
                for (let i = 0; i < segmentCount; i++) {
                    drawRingSegment(i * segmentAngle, (i + 1) * segmentAngle, pos3_Inner, pos3_Outer, COLOR_POS3, pos3_rotation);
                    drawNumberInSegment(ring3.numbers[i], i, pos3_Inner + ringThickness / 2, pos3_rotation);
                }
                
                const ring2 = currentRings[positionToRing[1]];
                for (let i = 0; i < segmentCount; i++) {
                    drawRingSegment(i * segmentAngle, (i + 1) * segmentAngle, pos2_Inner, pos2_Outer, COLOR_POS2, pos2_rotation);
                    drawNumberInSegment(ring2.numbers[i], i, pos2_Inner + ringThickness / 2, pos2_rotation);
                }
                
                const ring1 = currentRings[positionToRing[0]];
                for (let i = 0; i < segmentCount; i++) {
                    drawRingSegment(i * segmentAngle, (i + 1) * segmentAngle, pos1_Inner, pos1_Outer, COLOR_POS1, 0);
                    drawNumberInSegment(ring1.numbers[i], i, pos1_Inner + ringThickness / 2, 0);
                }
                
                drawCenterPoint();
                
                animationFrameId = requestAnimationFrame(draw);
            }
            
            async function init() {
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                
                await syncTimeWithServer();
                setInterval(syncTimeWithServer, 30 * 60 * 1000);
                draw();
            }
            
            init();
        })();
    </script>
</body>
</html>
