<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Кольца МСК</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Кольца МСК">
    <meta name="application-name" content="Кольца МСК">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23667eea'/><circle cx='50' cy='50' r='35' fill='white'/><circle cx='50' cy='50' r='25' fill='%23CCFFCC'/><text x='50' y='55' font-size='20' text-anchor='middle' fill='%23333' font-family='Arial'>К</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23667eea'/><circle cx='50' cy='50' r='35' fill='white'/><circle cx='50' cy='50' r='25' fill='%23CCFFCC'/><text x='50' y='55' font-size='20' text-anchor='middle' fill='%23333' font-family='Arial'>К</text></svg>">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/manifest+json,{
        &quot;name&quot;: &quot;Кольца МСК&quot;,
        &quot;short_name&quot;: &quot;Кольца&quot;,
        &quot;description&quot;: &quot;Вращающиеся кольца с синхронизацией по московскому времени&quot;,
        &quot;start_url&quot;: &quot;.&quot;,
        &quot;display&quot;: &quot;standalone&quot;,
        &quot;background_color&quot;: &quot;#667eea&quot;,
        &quot;theme_color&quot;: &quot;#667eea&quot;,
        &quot;orientation&quot;: &quot;portrait&quot;,
        &quot;icons&quot;: [{
            &quot;src&quot;: &quot;data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23667eea'/><circle cx='50' cy='50' r='35' fill='white'/><circle cx='50' cy='50' r='25' fill='%23CCFFCC'/><text x='50' y='55' font-size='20' text-anchor='middle' fill='%23333' font-family='Arial'>К</text></svg>&quot;,
            &quot;sizes&quot;: &quot;192x192&quot;,
            &quot;type&quot;: &quot;image/svg+xml&quot;
        }]
    }">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
            position: relative;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .time-indicator {
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 18px 16px;
            border-radius: 40px;
            font-size: clamp(18px, 5vw, 22px);
            font-weight: 700;
            text-align: center;
            color: #1a1a1a;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            line-height: 1.3;
            letter-spacing: 0.3px;
        }

        .info-text {
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 16px 16px;
            border-radius: 40px;
            font-size: clamp(16px, 4.5vw, 18px);
            text-align: center;
            color: #333;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-weight: 600;
            line-height: 1.4;
        }

        .canvas-container {
            width: 100%;
            aspect-ratio: 1/1;
            position: relative;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border-radius: 50%;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            padding: 0;
        }

        #ringCanvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
            background: white;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        .status-panel {
            width: 100%;
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 5px;
        }

        .indicator {
            flex: 1;
            background: white;
            padding: 18px 16px;
            border-radius: 40px;
            font-size: clamp(16px, 4.5vw, 18px);
            font-weight: 600;
            text-align: center;
            color: #333;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            line-height: 1.3;
            letter-spacing: 0.3px;
        }

        .sync-status {
            width: auto;
            min-width: 180px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 500;
            text-align: center;
            color: #4CAF50;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-top: 12px;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        .install-button {
            background: white;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            margin-top: 8px;
            cursor: pointer;
            transition: transform 0.2s;
            display: none; /* Скрыт по умолчанию, показывается только когда можно установить */
        }

        .install-button.show {
            display: block;
        }

        .install-button:active {
            transform: scale(0.95);
        }

        /* Оптимизация для очень маленьких экранов */
        @media (max-width: 380px) {
            .time-indicator {
                font-size: 16px;
                padding: 14px 12px;
            }
            
            .info-text {
                font-size: 14px;
                padding: 12px 12px;
            }
            
            .indicator {
                font-size: 14px;
                padding: 14px 12px;
            }
            
            .sync-status {
                font-size: 13px;
                padding: 10px 18px;
            }
        }

        /* Для больших экранов кольцо остается крупным */
        @media (min-width: 600px) {
            .app-container {
                max-width: 550px;
            }
            
            .canvas-container {
                margin: 15px 0;
            }
        }

        /* Защита от вылезания контента */
        .time-indicator, .info-text, .indicator, .sync-status {
            max-width: 100%;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="timeIndicator" class="time-indicator">Синхронизация...</div>
        <div id="infoText" class="info-text">Следующее вращение: понедельник 00:01 (МСК)</div>
        
        <div class="canvas-container">
            <canvas id="ringCanvas" width="800" height="800"></canvas>
        </div>
        
        <div class="status-panel">
            <div id="indicator" class="indicator">Цикл выполняется</div>
        </div>
        
        <div id="syncStatus" class="sync-status">🔄 Синхронизация...</div>
        
        <!-- Кнопка установки приложения -->
        <button id="installButton" class="install-button">📱 Установить приложение</button>
    </div>

    <script>
        (function() {
            // PWA установка
            let deferredPrompt;
            const installButton = document.getElementById('installButton');
            
            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                installButton.classList.add('show');
            });
            
            installButton.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`User response to the install prompt: ${outcome}`);
                
                deferredPrompt = null;
                installButton.classList.remove('show');
            });
            
            window.addEventListener('appinstalled', () => {
                console.log('PWA was installed');
                installButton.classList.remove('show');
            });

            // Защита от случайного масштабирования
            document.addEventListener('touchmove', function(e) {
                if (e.target === document.getElementById('ringCanvas')) {
                    e.preventDefault();
                }
            }, { passive: false });

            const canvas = document.getElementById('ringCanvas');
            const ctx = canvas.getContext('2d');
            const indicator = document.getElementById('indicator');
            const timeIndicator = document.getElementById('timeIndicator');
            const infoText = document.getElementById('infoText');
            const syncStatus = document.getElementById('syncStatus');
            
            // Функция для правильного отображения canvas на мобильных
            function resizeCanvas() {
                const container = canvas.parentElement;
                const size = Math.min(container.clientWidth, container.clientHeight, 500);
                canvas.style.width = size + 'px';
                canvas.style.height = size + 'px';
                // Сохраняем исходный размер для четкости
                canvas.width = 800;
                canvas.height = 800;
            }
            
            // Центр холста для рисования
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Параметры кольца - делаем их пропорционально больше
            const ringThickness = 70; // Увеличили толщину
            const diameter = 400; // Увеличили диаметр
            const radius = diameter / 2;
            
            // Радиусы для 4-х позиций
            const pos1_Inner = radius - ringThickness;
            const pos1_Outer = radius;
            const pos2_Inner = pos1_Outer;
            const pos2_Outer = pos2_Inner + ringThickness;
            const pos3_Inner = pos2_Outer;
            const pos3_Outer = pos3_Inner + ringThickness;
            const pos4_Inner = pos3_Outer;
            const pos4_Outer = pos4_Inner + ringThickness;
            
            const segmentCount = 10;
            const segmentAngle = (2 * Math.PI) / segmentCount;
            
            // ЦВЕТА ДЛЯ ПОЗИЦИЙ
            const COLOR_POS1 = '#CCFFCC';
            const COLOR_POS2 = '#90EE90';
            const COLOR_POS3 = '#87CEEB';
            const COLOR_POS4 = '#AFEEEE';
            
            const rings = [
                { id: 0, numbers: [2, 3, 4, 9, 12, 15, 22, 25, 35, 41] },
                { id: 1, numbers: [1, 5, 6, 11, 13, 14, 16, 17, 26, 27] },
                { id: 2, numbers: [43, 32, 33, 34.44, 36, 37, 38, 39, 28, 30.42] },
                { id: 3, numbers: [7, 10, 18, 29, 19, 24, 21, 20, 23, 8] }
            ];
            
            const SPEED_POS2 = 3;
            const SPEED_POS3 = 7;
            const SPEED_POS4 = 9;
            
            const FIXED_START_DATE = new Date('2024-01-01T00:01:00+03:00');
            
            let positionToRing = [0, 1, 2, 3];
            let pos2_rotation = 0;
            let pos3_rotation = 0;
            let pos4_rotation = 0;
            let currentWeekInCycle = 0;
            const moscowTimeOffset = 3 * 60 * 60 * 1000;
            let serverTimeOffset = 0;
            let timeSyncAttempts = 0;
            let isTimeSynced = false;
            
            const TIME_SERVERS = [
                'https://worldtimeapi.org/api/timezone/Europe/Moscow',
                'https://timeapi.io/api/Time/current/zone?timeZone=Europe/Moscow'
            ];
            
            async function syncTimeWithServer() {
                syncStatus.textContent = '🔄 Синхронизация...';
                syncStatus.style.color = '#FFA500';
                
                for (const server of TIME_SERVERS) {
                    try {
                        const startTime = Date.now();
                        const response = await fetch(server, { 
                            mode: 'cors',
                            headers: { 'Accept': 'application/json' }
                        });
                        
                        if (!response.ok) continue;
                        
                        const data = await response.json();
                        const roundTripTime = Date.now() - startTime;
                        
                        let serverTime;
                        if (server.includes('worldtimeapi')) {
                            serverTime = new Date(data.utc_datetime).getTime();
                        } else {
                            serverTime = new Date(data.dateTime).getTime();
                        }
                        
                        const estimatedServerTime = serverTime + (roundTripTime / 2);
                        const localTime = Date.now();
                        serverTimeOffset = estimatedServerTime - localTime;
                        
                        if (Math.abs(serverTimeOffset) < 3600000) {
                            isTimeSynced = true;
                            syncStatus.textContent = '✅ Синхронизировано';
                            syncStatus.style.color = '#4CAF50';
                            return;
                        }
                    } catch (e) {
                        console.log('Sync error:', e);
                    }
                }
                
                timeSyncAttempts++;
                if (timeSyncAttempts < 3) {
                    syncStatus.textContent = `⚠️ Попытка ${timeSyncAttempts}/3...`;
                    setTimeout(syncTimeWithServer, 3000);
                } else {
                    syncStatus.textContent = '⚠️ Локальное время';
                    syncStatus.style.color = '#FF5252';
                    isTimeSynced = true;
                }
            }
            
            function getPreciseMoscowTime() {
                const now = new Date(Date.now() + serverTimeOffset);
                return new Date(now.getTime() + moscowTimeOffset);
            }
            
            function getCurrentMondayMoscow() {
                const moscowTime = getPreciseMoscowTime();
                const day = moscowTime.getUTCDay();
                const diff = day === 0 ? 6 : day - 1;
                
                const monday = new Date(moscowTime);
                monday.setUTCDate(moscowTime.getUTCDate() - diff);
                monday.setUTCHours(0, 1, 0, 0);
                
                return new Date(monday.getTime() - moscowTimeOffset);
            }
            
            function getNextMondayMoscow() {
                const moscowTime = getPreciseMoscowTime();
                const day = moscowTime.getUTCDay();
                const diff = day === 0 ? 6 : day - 1;
                const daysToAdd = diff === 0 ? 7 : 7 - diff;
                
                const nextMonday = new Date(moscowTime);
                nextMonday.setUTCDate(moscowTime.getUTCDate() + daysToAdd);
                nextMonday.setUTCHours(0, 1, 0, 0);
                
                return new Date(nextMonday.getTime() - moscowTimeOffset);
            }
            
            function getWeeksBetween(startDate, endDate) {
                const msPerWeek = 7 * 24 * 60 * 60 * 1000;
                const diffMs = endDate - startDate;
                return Math.floor(diffMs / msPerWeek);
            }
            
            function formatMoscowTime(date) {
                const moscowTime = new Date(date.getTime() + moscowTimeOffset);
                
                const day = String(moscowTime.getUTCDate()).padStart(2, '0');
                const month = String(moscowTime.getUTCMonth() + 1).padStart(2, '0');
                const hours = String(moscowTime.getUTCHours()).padStart(2, '0');
                const minutes = String(moscowTime.getUTCMinutes()).padStart(2, '0');
                
                const weekdays = ['вс', 'пн', 'вт', 'ср', 'чт', 'пт', 'сб'];
                const weekday = weekdays[moscowTime.getUTCDay()];
                
                return `${weekday}, ${day}.${month} ${hours}:${minutes}`;
            }
            
            function updateStateFromSyncedTime() {
                const currentMonday = getCurrentMondayMoscow();
                const weeksSinceStart = getWeeksBetween(FIXED_START_DATE, currentMonday);
                
                currentWeekInCycle = weeksSinceStart % 10;
                
                pos2_rotation = (weeksSinceStart * SPEED_POS2 * segmentAngle) % (2 * Math.PI);
                pos3_rotation = (weeksSinceStart * SPEED_POS3 * segmentAngle) % (2 * Math.PI);
                pos4_rotation = (weeksSinceStart * SPEED_POS4 * segmentAngle) % (2 * Math.PI);
                
                const swaps = weeksSinceStart;
                positionToRing = (swaps % 2 === 0) ? [0, 1, 2, 3] : [1, 0, 2, 3];
            }
            
            function updateIndicators() {
                const moscowTime = getPreciseMoscowTime();
                const hours = String(moscowTime.getUTCHours()).padStart(2, '0');
                const minutes = String(moscowTime.getUTCMinutes()).padStart(2, '0');
                const seconds = String(moscowTime.getUTCSeconds()).padStart(2, '0');
                
                const weekdays = ['воскресенье', 'понедельник', 'вторник', 'среда', 'четверг', 'пятница', 'суббота'];
                const weekday = weekdays[moscowTime.getUTCDay()];
                
                timeIndicator.textContent = `${weekday}, ${hours}:${minutes}:${seconds}`;
                
                const nextMonday = getNextMondayMoscow();
                const nextStr = formatMoscowTime(nextMonday);
                infoText.textContent = `Следующее вращение: ${nextStr} (МСК)`;
                
                if (currentWeekInCycle >= 7) {
                    indicator.textContent = '⚠️ Цикл подходит к концу';
                    indicator.style.backgroundColor = '#FF5252';
                    indicator.style.color = 'white';
                } else {
                    indicator.textContent = '✓ Цикл выполняется';
                    indicator.style.backgroundColor = 'white';
                    indicator.style.color = '#333';
                }
            }
            
            function drawRingSegment(startAngle, endAngle, innerR, outerR, color, rotation = 0) {
                ctx.beginPath();
                const rotatedStart = startAngle + rotation;
                const rotatedEnd = endAngle + rotation;
                
                ctx.arc(centerX, centerY, outerR, rotatedStart, rotatedEnd);
                ctx.lineTo(
                    centerX + innerR * Math.cos(rotatedEnd),
                    centerY + innerR * Math.sin(rotatedEnd)
                );
                ctx.arc(centerX, centerY, innerR, rotatedEnd, rotatedStart, true);
                ctx.closePath();
                
                ctx.fillStyle = color;
                ctx.fill();
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            function drawNumberInSegment(number, segmentIndex, radiusPos, rotation = 0) {
                const angle = segmentIndex * segmentAngle + segmentAngle / 2 + rotation;
                const x = centerX + radiusPos * Math.cos(angle);
                const y = centerY + radiusPos * Math.sin(angle);
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(angle + Math.PI / 2);
                
                ctx.fillStyle = '#000';
                ctx.font = 'bold 26px -apple-system, BlinkMacSystemFont, Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let displayText;
                if (Number.isInteger(number)) {
                    displayText = number.toString();
                } else {
                    displayText = number.toFixed(1);
                }
                
                ctx.fillText(displayText, 0, 0);
                ctx.restore();
            }
            
            function drawCenterPoint() {
                ctx.beginPath();
                ctx.arc(centerX, centerY, 6, 0, 2 * Math.PI);
                ctx.fillStyle = '#333';
                ctx.fill();
            }
            
            function draw() {
                if (isTimeSynced) {
                    updateStateFromSyncedTime();
                    updateIndicators();
                }
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Рисуем от внешнего к внутреннему
                const ring4 = rings[positionToRing[3]];
                for (let i = 0; i < segmentCount; i++) {
                    drawRingSegment(i * segmentAngle, (i + 1) * segmentAngle, pos4_Inner, pos4_Outer, COLOR_POS4, pos4_rotation);
                    drawNumberInSegment(ring4.numbers[i], i, pos4_Inner + ringThickness / 2, pos4_rotation);
                }
                
                const ring3 = rings[positionToRing[2]];
                for (let i = 0; i < segmentCount; i++) {
                    drawRingSegment(i * segmentAngle, (i + 1) * segmentAngle, pos3_Inner, pos3_Outer, COLOR_POS3, pos3_rotation);
                    drawNumberInSegment(ring3.numbers[i], i, pos3_Inner + ringThickness / 2, pos3_rotation);
                }
                
                const ring2 = rings[positionToRing[1]];
                for (let i = 0; i < segmentCount; i++) {
                    drawRingSegment(i * segmentAngle, (i + 1) * segmentAngle, pos2_Inner, pos2_Outer, COLOR_POS2, pos2_rotation);
                    drawNumberInSegment(ring2.numbers[i], i, pos2_Inner + ringThickness / 2, pos2_rotation);
                }
                
                const ring1 = rings[positionToRing[0]];
                for (let i = 0; i < segmentCount; i++) {
                    drawRingSegment(i * segmentAngle, (i + 1) * segmentAngle, pos1_Inner, pos1_Outer, COLOR_POS1, 0);
                    drawNumberInSegment(ring1.numbers[i], i, pos1_Inner + ringThickness / 2, 0);
                }
                
                drawCenterPoint();
                
                requestAnimationFrame(draw);
            }
            
            // Инициализация
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // Старт
            syncTimeWithServer();
            setInterval(syncTimeWithServer, 30 * 60 * 1000);
            draw();
            
            // Экспорт для отладки
            window.getState = function() {
                return {
                    week: currentWeekInCycle + 1,
                    sync: isTimeSynced ? 'ok' : 'pending'
                };
            };
        })();
    </script>
</body>
</html>
