<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Угадай следующую комбинацию | Уникальные пары</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            padding: 20px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', monospace;
        }
        
        .app {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 40px);
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .dice {
            font-size: 2.4rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        
        .title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #FFE9C7;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.25);
            padding: 6px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }
        
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 60px;
            margin-bottom: 24px;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .msk-time {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            color: #FFE6B3;
            background: #2C553C;
            padding: 5px 14px;
            border-radius: 40px;
        }
        
        .step-badge {
            background: #D9A13B;
            color: #2A3A2A;
            padding: 5px 16px;
            border-radius: 40px;
            font-weight: 800;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 16px 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,215,140,0.6);
        }
        
        .numbers {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .number-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .number {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1.3rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        
        .number.red {
            background: linear-gradient(145deg, #E53E3E, #C53030);
            color: white;
        }
        
        .number.blue {
            background: linear-gradient(145deg, #3B82F6, #1E40AF);
            color: white;
        }
        
        .number.green {
            background: linear-gradient(145deg, #2D6A4F, #1B4D3A);
            color: #FFF2CF;
        }
        
        .top-position {
            margin-bottom: 4px;
        }
        
        @media (max-width: 600px) {
            .number {
                width: 44px;
                height: 44px;
                font-size: 1.1rem;
            }
            .card {
                padding: 12px 6px;
            }
            .title {
                font-size: 1.2rem;
            }
        }
        
        @media (max-width: 480px) {
            .number {
                width: 38px;
                height: 38px;
                font-size: 0.95rem;
            }
            .grid {
                gap: 8px;
            }
            .info-bar {
                padding: 6px 12px;
            }
            .msk-time, .step-badge {
                font-size: 0.7rem;
                padding: 3px 8px;
            }
        }
        
        @keyframes numberPop {
            0% { transform: scale(1.1); box-shadow: 0 0 0 3px rgba(255,215,140,0.6);}
            100% { transform: scale(1); }
        }
        
        .flash {
            animation: numberPop 0.25s ease-out;
        }

        .action-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
            gap: 20px;
            padding: 8px 0;
        }

        .action-btn {
            flex: 1;
            background: white;
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', monospace;
            color: black;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.1s linear;
            letter-spacing: 1px;
        }
        
        .action-btn:active {
            transform: scale(0.97);
            background: #f0f0f0;
        }

        @media (max-width: 480px) {
            .action-btn {
                padding: 10px 16px;
                font-size: 1rem;
            }
            .action-buttons {
                gap: 16px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <span class="dice">🎲</span>
        <span class="title">Угадай следующую комбинацию</span>
    </div>
    
    <div class="info-bar">
        <span class="msk-time" id="mskClock">--:--:--</span>
        <span class="step-badge" id="stepDisplay">0/10</span>
    </div>
    
    <div id="gridContainer" class="grid"></div>

    <div class="action-buttons">
        <button class="action-btn" id="prevWeekBtn">Старт</button>
        <button class="action-btn" id="currentWeekBtn">Стоп</button>
    </div>
</div>

<script>
    // ========= КОНСТАНТЫ =========
    const TOTAL_CARDS = 10;            // 10 колонок (10 шагов цикла)
    const NUMBERS_PER_CARD = 4;        // 4 числа в колонке
    const TOTAL_STEPS_IN_CYCLE = 10;   // цикл из 10 шагов (недель)
    
    // ГРУППА 1: красные кружочки (10 уникальных чисел) — всегда первая позиция (верхний ряд)
    // Значения фиксированы, но порядок будет меняться детерминированно каждый цикл/шаг
    const RED_NUMBERS_SET = new Set([2, 3, 4, 12, 22, 25, 35, 36, 40, 27]);
    const RED_ARRAY = [2, 3, 4, 12, 22, 25, 35, 36, 40, 27];
    
    // ГРУППА 2: синие кружочки (10 уникальных чисел) — всегда вторая позиция (после красного)
    const BLUE_NUMBERS_SET = new Set([18, 8, 21, 20, 23, 7, 19, 29, 24, 10]);
    const BLUE_ARRAY = [18, 8, 21, 20, 23, 7, 19, 29, 24, 10];
    
    // Все особые числа (красные + синие)
    const SPECIAL_NUMBERS_SET = new Set([...RED_NUMBERS_SET, ...BLUE_NUMBERS_SET]);
    
    // Остальные числа от 1 до 40, исключая особые (ровно 20 чисел)
    const REMAINING_ARRAY = (() => {
        const remaining = [];
        for (let i = 1; i <= 40; i++) {
            if (!SPECIAL_NUMBERS_SET.has(i)) remaining.push(i);
        }
        return remaining;
    })();
    
    // ========= УНИКАЛЬНЫЕ ПАРЫ (КРАСНЫЙ-СИНИЙ) НА ВЕСЬ ЦИКЛ =========
    // Чтобы ни одна пара (красный, синий) не повторялась в течение 10 шагов,
    // мы формируем совершенное паросочетание: каждый красный ровно один раз встречается с каждым синим?
    // Но у нас 10 красных и 10 синих, всего возможно 100 уникальных пар. За 10 шагов мы можем создать 10 различных пар,
    // причем так, чтобы ни одна пара не дублировалась в пределах цикла.
    // Для детерминированности на основе cycleNumber и stepNumber мы будем генерировать перестановку синих для красных.
    // Алгоритм: в каждом цикле задаём случайную (но детерминированную от цикла) биекцию f: красный -> синий.
    // Для каждого шага (step от 1 до 10) используем step-ю пару из этой биекции (упорядочив красные по возрастанию или по детерминированному порядку).
    // Дополнительно: чтобы внутри одного цикла 10 пар были все различны, просто используем 10 разных красных и 10 разных синих.
    // ГАРАНТИРУЕТ: на протяжении цикла ни одна пара (красный, синий) не встретится дважды.
    
    // Функция получения детерминированного соответствия "красный -> синий" для данного cycleNumber (биекция)
    // Возвращает массив объектов { red, blue } длиной 10, где каждый red и каждый blue встречается ровно 1 раз.
    function getUniquePairingForCycle(cycleNumber) {
        // Используем детерминированное перемешивание синих на основе cycleNumber.
        // Красные сохраняем в фиксированном порядке (можно отсортировать для предсказуемости, но пары будут уникальны)
        const sortedReds = [...RED_ARRAY].sort((a,b) => a - b);
        const shuffledBlues = [...BLUE_ARRAY];
        
        // Генерируем seed из cycleNumber для перемешивания синих (чтобы каждый цикл было разное сопоставление)
        const seedForCycle = hashString(`pairing_cycle_${cycleNumber}`);
        const rng = new SeededRandom(seedForCycle);
        for (let i = shuffledBlues.length - 1; i > 0; i--) {
            const j = Math.floor(rng.next() * (i + 1));
            [shuffledBlues[i], shuffledBlues[j]] = [shuffledBlues[j], shuffledBlues[i]];
        }
        
        // Строим массив пар: i-ый красный (из отсортированного списка) соединяется с i-ым перемешанным синим
        const pairs = [];
        for (let i = 0; i < TOTAL_CARDS; i++) {
            pairs.push({
                red: sortedReds[i],
                blue: shuffledBlues[i]
            });
        }
        return pairs;
    }
    
    // Для конкретного шага (1..10) извлекаем нужную пару (красный, синий) из биекции цикла.
    // stepNumber — номер шага от 1 до 10 (соответствует позиции колонки)
    // Чтобы визуально в каждой колонке был уникальный красный и уникальный синий, а пары не повторялись.
    function getRedBlueForStep(cycleNumber, stepNumber) {
        const pairing = getUniquePairingForCycle(cycleNumber);
        // stepNumber от 1 до 10, индекс stepNumber-1
        const idx = (stepNumber - 1) % TOTAL_CARDS;
        return pairing[idx];
    }
    
    // ========= ДЕТЕРМИНИРОВАННЫЙ ГЕНЕРАТОР ДЛЯ ОБЫЧНЫХ ЧИСЕЛ (позиции 3 и 4) =========
    // Для каждой карты (колонки) добавляем два уникальных обычных числа из REMAINING_ARRAY,
    // при этом в рамках одного цикла каждое обычное число используется ровно один раз? Нет, у нас 20 обычных чисел, а позиций (3 и 4) всего 20.
    // Значит каждое обычное число будет встречаться ровно один раз за цикл на позициях 3-4.
    // Это идеально подходит — ни одно обычное число не дублируется в течение цикла. Дополнительно обеспечим случайный порядок.
    function getRemainingNumbersForCycle(cycleNumber) {
        const seedRem = hashString(`remaining_cycle_${cycleNumber}`);
        const rngRem = new SeededRandom(seedRem);
        const shuffledRemaining = rngRem.shuffleArray([...REMAINING_ARRAY]);
        // Разобьём на 10 пар для каждой колонки (по два числа)
        const pairs = [];
        for (let i = 0; i < TOTAL_CARDS; i++) {
            const a = shuffledRemaining[i * 2];
            const b = shuffledRemaining[i * 2 + 1];
            pairs.push([a, b]);
        }
        return pairs;
    }
    
    // Перемешиваем порядок двух обычных чисел внутри колонки (позиции 3 и 4) на основе дополнительного seed
    function shuffleTwoNumbersForCard(numA, numB, cycleNumber, stepNumber, redNum, blueNum) {
        const seedStr = `card_shuffle_${cycleNumber}_${stepNumber}_${redNum}_${blueNum}`;
        const seed = hashString(seedStr);
        const rng = new SeededRandom(seed);
        if (rng.next() < 0.5) {
            return [numA, numB];
        } else {
            return [numB, numA];
        }
    }
    
    // ========= ПОЛНАЯ ГЕНЕРАЦИЯ КОМБИНАЦИЙ С УНИКАЛЬНЫМИ ПАРАМИ (красный-синий) =========
    function generateCombinations(cycleNumber, stepNumber) {
        // 1. Получаем уникальную пару красный/синий для данной позиции stepNumber (колонки)
        const { red, blue } = getRedBlueForStep(cycleNumber, stepNumber);
        
        // 2. Получаем для всего цикла распределение обычных чисел по колонкам (детерминированно от цикла)
        const remainingPairsForCycle = getRemainingNumbersForCycle(cycleNumber);
        // stepNumber от 1 до 10 -> индекс stepNumber-1
        let [remA, remB] = remainingPairsForCycle[stepNumber - 1];
        
        // 3. Перемешиваем порядок двух обычных чисел (чтобы визуально не было фиксированного порядка)
        const shuffledRem = shuffleTwoNumbersForCard(remA, remB, cycleNumber, stepNumber, red, blue);
        const pos3 = shuffledRem[0];
        const pos4 = shuffledRem[1];
        
        // Формируем колонку: [красный, синий, обычное1, обычное2]
        return [red, blue, pos3, pos4];
    }
    
    // Генерируем ВСЕ 10 колонок для заданных cycleNumber и stepNumber?
    // Внимание: каждый вызов generateCombinations для конкретного шага даёт одну колонку.
    // Для отображения целой недели (10 колонок) мы должны отобразить все 10 шагов текущего stepNumber?
    // Нет! В логике исходной игры: одна неделя = один шаг = 10 колонок (одновременно показываются все 10 карточек).
    // Каждая колонка соответствует определённому «месту» в цикле, но пара (красный, синий) для каждой колонки должна быть уникальной в рамках цикла.
    // Текущая неделя (stepNumber) – это номер шага от 1 до 10, но ВСЕ колонки на экране – это "предсказание" всех 10 позиций цикла? Нет, в предыдущей версии всегда генерировались 10 карточек, каждая со своим красным/синим.
    // Новая логика: На каждой неделе (шаге) мы показываем сразу все 10 колонок, соответствующих текущему шагу? Или 10 колонок для этого шага? Неправильно.
    // Разберёмся: исходный проект генерировал 10 карточек на экран, причем каждая карточка имела красное число (из 10) и синее (из 10).
    // Задача: чтобы за весь цикл (10 недель) ни в одной колонке не повторилась пара (красный, синий).
    // Значит на каждой неделе мы показываем 10 колонок, но пары (красный, синий) распределены так, что в пределах цикла (10 недель) каждая из 100 возможных пар не повторяется дважды? Не нужно 100, нужно, чтобы конкретные пары в каждой колонке не дублировались на разных неделях.
    // Проще: В течение цикла (10 недель) для каждой позиции колонки (например, 1-я колонка слева) пары (красный, синий) всегда разные.
    // Визуально: на экране всегда 10 колонок. Через неделю набор пар в колонках меняется, и ни одна пара не повторялась за 10 недель.
    // Для этого введём "позицию колонки" от 0 до 9. Для каждой недели (stepNumber 1..10) будем брать уникальное соответствие.
    // Более элегантно: Создаём матрицу 10x10, где строки — недели (шаги), столбцы — колонки. Элемент матрицы — пара (red, blue).
    // Заполняем так, чтобы в каждой строке и каждом столбце все красные и синие были различны (латинский квадрат).
    // Тогда за 10 недель ни одна пара не повторится (каждая пара встречается ровно один раз). Это идеальное решение.
    
    // РЕАЛИЗАЦИЯ ЛАТИНСКОГО КВАДРАТА ДЛЯ ПАР (КРАСНЫЙ, СИНИЙ)
    // Строим биекцию: для недели step (0..9) и колонки col (0..9) определяем индекс красного и синего.
    // Используем детерминированную перестановку на основе cycleNumber.
    function getRedBlueForWeekAndColumn(cycleNumber, weekStep, columnIdx) {
        // weekStep: 1..10 (текущий шаг), columnIdx: 0..9 (номер колонки)
        // Чтобы получить латинский квадрат: зададим перестановку для красных и перестановку для синих.
        // Упорядочим красные и синие массивы.
        const sortedReds = [...RED_ARRAY].sort((a,b) => a-b);
        const sortedBlues = [...BLUE_ARRAY].sort((a,b) => a-b);
        
        // Создаём seed на основе cycleNumber, который задаёт две перестановки (для красных и синих)
        const seedRedPerm = hashString(`red_perm_cycle_${cycleNumber}`);
        const seedBluePerm = hashString(`blue_perm_cycle_${cycleNumber}`);
        const rngRed = new SeededRandom(seedRedPerm);
        const rngBlue = new SeededRandom(seedBluePerm);
        
        // Генерируем перестановку для красных (длина 10)
        let redIndices = [...Array(TOTAL_CARDS).keys()];
        for (let i = redIndices.length - 1; i > 0; i--) {
            const j = Math.floor(rngRed.next() * (i + 1));
            [redIndices[i], redIndices[j]] = [redIndices[j], redIndices[i]];
        }
        
        // Генерируем перестановку для синих
        let blueIndices = [...Array(TOTAL_CARDS).keys()];
        for (let i = blueIndices.length - 1; i > 0; i--) {
            const j = Math.floor(rngBlue.next() * (i + 1));
            [blueIndices[i], blueIndices[j]] = [blueIndices[j], blueIndices[i]];
        }
        
        // Латинский квадрат: redIdx = (redPerm[week] + col) mod 10, blueIdx = (bluePerm[week] + col) mod 10
        const weekIdx = (weekStep - 1) % TOTAL_CARDS;
        const redShift = redIndices[weekIdx];
        const blueShift = blueIndices[weekIdx];
        const redPos = (redShift + columnIdx) % TOTAL_CARDS;
        const bluePos = (blueShift + columnIdx) % TOTAL_CARDS;
        
        const redNumber = sortedReds[redPos];
        const blueNumber = sortedBlues[bluePos];
        return { red: redNumber, blue: blueNumber };
    }
    
    // Обновлённая генерация всех 10 карточек для текущей недели (stepNumber)
    function generateAllCardsForWeek(cycleNumber, stepNumber) {
        // Получаем для каждой колонки уникальные пары (красный, синий) без повторений в рамках цикла
        const remainingPairsForCycle = getRemainingNumbersForCycle(cycleNumber);
        const cards = [];
        
        for (let col = 0; col < TOTAL_CARDS; col++) {
            // Уникальная пара для данной недели и колонки
            const { red, blue } = getRedBlueForWeekAndColumn(cycleNumber, stepNumber, col);
            // Обычные числа для этой колонки (фиксированы на цикл, но для колонки col)
            let [remA, remB] = remainingPairsForCycle[col];
            // Перемешиваем порядок обычных чисел для колонки
            const seedStr = `card_shuffle_${cycleNumber}_week${stepNumber}_col${col}_${red}_${blue}`;
            const seed = hashString(seedStr);
            const rng = new SeededRandom(seed);
            let pos3, pos4;
            if (rng.next() < 0.5) {
                pos3 = remA; pos4 = remB;
            } else {
                pos3 = remB; pos4 = remA;
            }
            cards.push([red, blue, pos3, pos4]);
        }
        return cards;
    }
    
    // ========= ХЕШ И СИД =========
    function hashString(str) {
        let hash = 5381;
        for (let i = 0; i < str.length; i++) {
            hash = ((hash << 5) + hash) + str.charCodeAt(i);
            hash = hash & 0x7fffffff;
        }
        return hash;
    }
    
    class SeededRandom {
        constructor(seed) {
            this.seed = seed;
            this.state = seed;
        }
        next() {
            this.state = (this.state * 1103515245 + 12345) & 0x7fffffff;
            return this.state / 0x7fffffff;
        }
        shuffleArray(arr) {
            const result = [...arr];
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(this.next() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }
    }
    
    // ========= РАСЧЁТ ТЕКУЩЕГО ШАГА И ЦИКЛА =========
    function getCurrentCycleAndStep(referenceDate = null) {
        const now = referenceDate ? new Date(referenceDate) : new Date();
        const mskNow = new Date(now.getTime() + (3 * 60 * 60 * 1000));
        const year = mskNow.getUTCFullYear();
        const month = mskNow.getUTCMonth();
        const date = mskNow.getUTCDate();
        
        let currentMonday = new Date(Date.UTC(year, month, date, 0, 1, 0));
        let dayOfWeek = currentMonday.getUTCDay();
        if (dayOfWeek === 0) dayOfWeek = 7;
        const daysToMonday = (dayOfWeek === 1) ? 0 : (dayOfWeek - 1);
        currentMonday.setUTCDate(currentMonday.getUTCDate() - daysToMonday);
        
        if (mskNow < currentMonday) {
            currentMonday.setUTCDate(currentMonday.getUTCDate() - 7);
        }
        
        const epochStart = new Date(Date.UTC(2025, 0, 6, 0, 1, 0));
        const weeksSinceEpoch = Math.floor((currentMonday - epochStart) / (7 * 24 * 60 * 60 * 1000));
        const cycleNumber = Math.floor(weeksSinceEpoch / TOTAL_STEPS_IN_CYCLE);
        let stepNumber = (weeksSinceEpoch % TOTAL_STEPS_IN_CYCLE) + 1;
        if (stepNumber < 1) stepNumber = 1;
        return { cycleNumber, stepNumber, currentMonday };
    }
    
    function getWeekData(offsetWeeks = 0) {
        const now = new Date();
        const targetDate = new Date(now.getTime() + offsetWeeks * 7 * 24 * 60 * 60 * 1000);
        const { cycleNumber, stepNumber } = getCurrentCycleAndStep(targetDate);
        return { cycleNumber, stepNumber };
    }
    
    // ========= УПРАВЛЕНИЕ СОСТОЯНИЕМ =========
    let currentCards = null;
    let autoResetTimer = null;
    let isPrevModeActive = false;
    let scheduledWeeklyUpdate = null;
    
    const gridContainer = document.getElementById('gridContainer');
    const stepDisplaySpan = document.getElementById('stepDisplay');
    const prevBtn = document.getElementById('prevWeekBtn');
    const currentBtn = document.getElementById('currentWeekBtn');
    
    function renderCards(cards, stepNumber) {
        if (!cards) return;
        const getColorClass = (num) => {
            if (RED_NUMBERS_SET.has(num)) return 'red';
            if (BLUE_NUMBERS_SET.has(num)) return 'blue';
            return 'green';
        };
        
        let html = '';
        for (let i = 0; i < TOTAL_CARDS; i++) {
            const card = cards[i];
            html += `
                <div class="card">
                    <div class="numbers">
                        <div class="number-row top-position">
                            <div class="number ${getColorClass(card[0])}">${card[0]}</div>
                        </div>
                        <div class="number-row">
                            <div class="number ${getColorClass(card[1])}">${card[1]}</div>
                            <div class="number ${getColorClass(card[2])}">${card[2]}</div>
                            <div class="number ${getColorClass(card[3])}">${card[3]}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        gridContainer.innerHTML = html;
        stepDisplaySpan.innerText = `${stepNumber}/${TOTAL_STEPS_IN_CYCLE}`;
        document.querySelectorAll('.number').forEach(el => {
            el.classList.add('flash');
            setTimeout(() => el.classList.remove('flash'), 250);
        });
    }
    
    function loadCurrentWeek() {
        if (autoResetTimer) clearTimeout(autoResetTimer);
        const { cycleNumber, stepNumber } = getWeekData(0);
        const cards = generateAllCardsForWeek(cycleNumber, stepNumber);
        currentCards = cards;
        isPrevModeActive = false;
        renderCards(cards, stepNumber);
    }
    
    function loadPreviousWeek() {
        if (autoResetTimer) clearTimeout(autoResetTimer);
        const { cycleNumber, stepNumber } = getWeekData(-1);
        const cards = generateAllCardsForWeek(cycleNumber, stepNumber);
        currentCards = cards;
        isPrevModeActive = true;
        renderCards(cards, stepNumber);
        autoResetTimer = setTimeout(() => {
            if (isPrevModeActive) loadCurrentWeek();
            autoResetTimer = null;
        }, 60 * 1000);
    }
    
    function scheduleNextWeekUpdate() {
        if (scheduledWeeklyUpdate) clearTimeout(scheduledWeeklyUpdate);
        const now = new Date();
        const mskNow = new Date(now.getTime() + 3 * 60 * 60 * 1000);
        let nextMonday = new Date(mskNow);
        nextMonday.setUTCDate(nextMonday.getUTCDate() + ((8 - nextMonday.getUTCDay()) % 7 || 7));
        nextMonday.setUTCHours(0, 1, 0, 0);
        const delay = nextMonday.getTime() - mskNow.getTime();
        if (delay > 0 && delay < 7 * 24 * 60 * 60 * 1000) {
            scheduledWeeklyUpdate = setTimeout(() => {
                if (autoResetTimer) clearTimeout(autoResetTimer);
                loadCurrentWeek();
                scheduleNextWeekUpdate();
            }, delay);
        }
    }
    
    function updateMoscowClock() {
        const now = new Date();
        const msk = new Date(now.getTime() + 3 * 60 * 60 * 1000);
        const hh = String(msk.getUTCHours()).padStart(2, '0');
        const mm = String(msk.getUTCMinutes()).padStart(2, '0');
        const ss = String(msk.getUTCSeconds()).padStart(2, '0');
        const clockSpan = document.getElementById('mskClock');
        if (clockSpan) clockSpan.innerText = `${hh}:${mm}:${ss}`;
    }
    
    function init() {
        loadCurrentWeek();
        updateMoscowClock();
        setInterval(updateMoscowClock, 1000);
        scheduleNextWeekUpdate();
        prevBtn.addEventListener('click', (e) => { e.preventDefault(); loadPreviousWeek(); });
        currentBtn.addEventListener('click', (e) => { e.preventDefault(); if(autoResetTimer) clearTimeout(autoResetTimer); loadCurrentWeek(); });
    }
    
    init();
</script>
</body>
</html>
