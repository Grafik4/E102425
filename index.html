<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Угадайка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: linear-gradient(135deg, #1a472a 0%, #0e2a1a 100%);
            min-height: 100vh;
            padding: 20px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', monospace;
        }
        
        .app {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .dice {
            font-size: 2.4rem;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }
        
        .title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #FFE9C7;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
            background: rgba(0,0,0,0.25);
            padding: 6px 20px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }
        
        .info-bar {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            padding: 10px 18px;
            border-radius: 60px;
            margin-bottom: 24px;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .msk-time {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: bold;
            color: #FFE6B3;
            background: #2C553C;
            padding: 5px 14px;
            border-radius: 40px;
        }
        
        .step-badge {
            background: #D9A13B;
            color: #2A3A2A;
            padding: 5px 16px;
            border-radius: 40px;
            font-weight: 800;
        }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .card {
            background: white;
            border-radius: 20px;
            padding: 16px 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,215,140,0.6);
        }
        
        .numbers {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .number-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .number {
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 1.3rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        }
        
        .number.red {
            background: linear-gradient(145deg, #E53E3E, #C53030);
            color: white;
        }
        
        .number.blue {
            background: linear-gradient(145deg, #3B82F6, #1E40AF);
            color: white;
        }
        
        .number.green {
            background: linear-gradient(145deg, #2D6A4F, #1B4D3A);
            color: #FFF2CF;
        }
        
        .top-position {
            margin-bottom: 4px;
        }
        
        @media (max-width: 600px) {
            .number {
                width: 44px;
                height: 44px;
                font-size: 1.1rem;
            }
            .card {
                padding: 12px 6px;
            }
            .title {
                font-size: 1.2rem;
            }
        }
        
        @media (max-width: 480px) {
            .number {
                width: 38px;
                height: 38px;
                font-size: 0.95rem;
            }
            .grid {
                gap: 8px;
            }
            .info-bar {
                padding: 6px 12px;
            }
            .msk-time, .step-badge {
                font-size: 0.7rem;
                padding: 3px 8px;
            }
        }
        
        @keyframes numberPop {
            0% { transform: scale(1.1); box-shadow: 0 0 0 3px rgba(255,215,140,0.6);}
            100% { transform: scale(1); }
        }
        
        .flash {
            animation: numberPop 0.25s ease-out;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <span class="dice">🎲</span>
        <span class="title">Угадай следующую комбинацию</span>
    </div>
    
    <div class="info-bar">
        <span class="msk-time" id="mskClock">--:--:--</span>
        <span class="step-badge" id="stepDisplay">0/10</span>
    </div>
    
    <div id="gridContainer" class="grid"></div>
</div>

<script>
    // ========= КОНСТАНТЫ =========
    const TOTAL_CARDS = 10;           // 10 окошек
    const NUMBERS_PER_CARD = 4;       // 4 числа в каждом окошке
    const TOTAL_STEPS_IN_CYCLE = 10;  // цикл из 10 шагов
    
    // ГРУППА 1: красные кружочки (10 чисел) - всегда на первом месте вверху
    const RED_NUMBERS = new Set([2, 3, 4, 12, 22, 25, 35, 36, 41, 27]);
    const RED_ARRAY = [2, 3, 4, 12, 22, 25, 35, 36, 41, 27];
    
    // ГРУППА 2: синие кружочки (10 чисел) - всегда на втором месте
    const BLUE_NUMBERS = new Set([18, 8, 21, 20, 23, 7, 19, 29, 24, 10]);
    const BLUE_ARRAY = [18, 8, 21, 20, 23, 7, 19, 29, 24, 10];
    
    // Все особые числа (20 штук)
    const SPECIAL_NUMBERS = new Set([...RED_NUMBERS, ...BLUE_NUMBERS]);
    
    // Остальные числа от 1 до 40 (20 штук)
    const getRemainingNumbers = () => {
        const remaining = [];
        for (let i = 1; i <= 40; i++) {
            if (!SPECIAL_NUMBERS.has(i)) {
                remaining.push(i);
            }
        }
        return remaining;
    };
    
    // состояние
    let currentStep = 0;              // текущий шаг в цикле (0-10)
    let currentCards = [];            // текущие комбинации
    let currentCycleId = 0;           // ID текущего цикла (для отслеживания)
    let stepHistory = [];              // история шагов текущего цикла
    let nextUpdateTimeout = null;      // таймер до следующего обновления
    
    // DOM
    const gridEl = document.getElementById('gridContainer');
    const stepDisplay = document.getElementById('stepDisplay');
    const mskClock = document.getElementById('mskClock');
    
    // ========= ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =========
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    // Генерация полного набора из 10 карточек
    function generateFullCardSet() {
        const cards = Array(TOTAL_CARDS).fill().map(() => Array(NUMBERS_PER_CARD).fill(null));
        
        // 1. РАЗМЕЩАЕМ КРАСНЫЕ ЧИСЛА (на первую позицию)
        const shuffledRed = shuffleArray([...RED_ARRAY]);
        for (let i = 0; i < TOTAL_CARDS; i++) {
            if (i < shuffledRed.length) {
                cards[i][0] = shuffledRed[i];
            }
        }
        
        // 2. РАЗМЕЩАЕМ СИНИЕ ЧИСЛА (на вторую позицию)
        const shuffledBlue = shuffleArray([...BLUE_ARRAY]);
        let blueIndex = 0;
        for (let i = 0; i < TOTAL_CARDS; i++) {
            if (cards[i][1] === null && blueIndex < shuffledBlue.length) {
                cards[i][1] = shuffledBlue[blueIndex++];
            }
        }
        
        // 3. ПОЛУЧАЕМ ОСТАВШИЕСЯ ЧИСЛА
        let remaining = getRemainingNumbers();
        remaining = shuffleArray(remaining);
        
        // 4. ЗАПОЛНЯЕМ ОСТАВШИЕСЯ ПОЗИЦИИ
        let remainingIndex = 0;
        for (let i = 0; i < TOTAL_CARDS; i++) {
            for (let pos = 2; pos < NUMBERS_PER_CARD; pos++) {
                if (cards[i][pos] === null && remainingIndex < remaining.length) {
                    cards[i][pos] = remaining[remainingIndex++];
                }
            }
        }
        
        // 5. ЗАПОЛНЯЕМ ПРОПУЩЕННЫЕ МЕСТА (если есть)
        const allNumbers = new Set();
        for (let card of cards) {
            for (let num of card) {
                if (num !== null) allNumbers.add(num);
            }
        }
        
        if (allNumbers.size < 40) {
            const missing = [];
            for (let i = 1; i <= 40; i++) {
                if (!allNumbers.has(i)) missing.push(i);
            }
            for (let missingNum of missing) {
                for (let card of cards) {
                    let placed = false;
                    for (let pos = 0; pos < NUMBERS_PER_CARD; pos++) {
                        if (card[pos] === null) {
                            card[pos] = missingNum;
                            placed = true;
                            break;
                        }
                    }
                    if (placed) break;
                }
            }
        }
        
        // 6. СОРТИРУЕМ С СОХРАНЕНИЕМ ПОЗИЦИЙ
        for (let card of cards) {
            let redNum = null;
            let blueNum = null;
            let others = [];
            
            for (let num of card) {
                if (RED_NUMBERS.has(num)) {
                    redNum = num;
                } else if (BLUE_NUMBERS.has(num)) {
                    blueNum = num;
                } else {
                    others.push(num);
                }
            }
            
            const newCard = [];
            newCard[0] = redNum !== null ? redNum : (others.shift() || 0);
            newCard[1] = blueNum !== null ? blueNum : (others.shift() || 0);
            while (newCard.length < NUMBERS_PER_CARD && others.length > 0) {
                newCard.push(others.shift());
            }
            
            for (let i = 0; i < NUMBERS_PER_CARD; i++) {
                card[i] = newCard[i];
            }
        }
        
        return cards;
    }
    
    // Проверка использования всех чисел
    function validateAllNumbersUsed(cards) {
        const usedNumbers = new Set();
        for (let card of cards) {
            for (let num of card) {
                usedNumbers.add(num);
            }
        }
        return usedNumbers.size === 40;
    }
    
    // Проверка распределения особых чисел
    function validateSpecialNumbersDistributed(cards) {
        const redPositions = new Set();
        const bluePositions = new Set();
        
        for (let i = 0; i < cards.length; i++) {
            for (let num of cards[i]) {
                if (RED_NUMBERS.has(num)) {
                    if (redPositions.has(i)) return false;
                    redPositions.add(i);
                }
                if (BLUE_NUMBERS.has(num)) {
                    if (bluePositions.has(i)) return false;
                    bluePositions.add(i);
                }
            }
        }
        return redPositions.size === 10 && bluePositions.size === 10;
    }
    
    // Ключ для сравнения шагов
    function snapshotKey(cardsArray) {
        return cardsArray.map(card => card.join(',')).sort().join('|');
    }
    
    // Генерация уникального шага в рамках текущего цикла
    function generateUniqueStepForCycle() {
        let attempts = 0;
        const maxAttempts = 100;
        let cards = null;
        
        while (attempts < maxAttempts) {
            cards = generateFullCardSet();
            
            if (validateAllNumbersUsed(cards) && validateSpecialNumbersDistributed(cards)) {
                const key = snapshotKey(cards);
                if (!stepHistory.includes(key)) {
                    return { cards, key };
                }
            }
            attempts++;
        }
        
        cards = generateFullCardSet();
        return { cards, key: snapshotKey(cards) };
    }
    
    // Сброс цикла и начало нового
    function resetAndStartNewCycle() {
        // Сбрасываем состояние цикла
        currentStep = 0;
        stepHistory = [];
        currentCycleId++;
        
        // Генерируем первый шаг нового цикла
        const { cards, key } = generateUniqueStepForCycle();
        currentCards = cards.map(c => [...c]);
        stepHistory.push(key);
        currentStep = 1;
        
        // Обновляем отображение
        renderGrid();
        updateStepDisplay();
        
        // Запускаем процесс для оставшихся 9 шагов
        scheduleNextSteps();
    }
    
    // Выполнение следующего шага в текущем цикле
    function performNextStep() {
        if (currentStep >= TOTAL_STEPS_IN_CYCLE) {
            // Цикл завершён, ждём следующего понедельника для нового цикла
            return false;
        }
        
        const { cards, key } = generateUniqueStepForCycle();
        currentCards = cards.map(c => [...c]);
        stepHistory.push(key);
        currentStep++;
        
        renderGrid();
        updateStepDisplay();
        
        return currentStep < TOTAL_STEPS_IN_CYCLE;
    }
    
    // Планирование следующих шагов (еженедельно по понедельникам в 00:01)
    function scheduleNextSteps() {
        // Отменяем предыдущие таймеры
        if (nextUpdateTimeout) clearTimeout(nextUpdateTimeout);
        
        // Если цикл уже завершён, планируем начало нового цикла
        if (currentStep >= TOTAL_STEPS_IN_CYCLE) {
            scheduleNewCycleStart();
            return;
        }
        
        // Планируем следующий шаг (еженедельно)
        const nextMonday = getNextMondayAt0001();
        const delay = nextMonday.getTime() - Date.now();
        
        nextUpdateTimeout = setTimeout(() => {
            const hasMoreSteps = performNextStep();
            if (hasMoreSteps) {
                scheduleNextSteps();
            } else {
                // Цикл завершён, планируем начало следующего цикла
                scheduleNewCycleStart();
            }
        }, delay);
    }
    
    // Планирование начала нового цикла
    function scheduleNewCycleStart() {
        const nextMonday = getNextMondayAt0001();
        const delay = nextMonday.getTime() - Date.now();
        
        nextUpdateTimeout = setTimeout(() => {
            resetAndStartNewCycle();
        }, delay);
    }
    
    // Получение следующего понедельника в 00:01 по московскому времени
    function getNextMondayAt0001() {
        const now = new Date();
        // Получаем московское время
        const mskNow = new Date(now.getTime() + (3 * 60 * 60 * 1000));
        
        const year = mskNow.getUTCFullYear();
        const month = mskNow.getUTCMonth();
        const date = mskNow.getUTCDate();
        const dayOfWeek = mskNow.getUTCDay(); // 0 = воскресенье, 1 = понедельник
        
        let targetDate;
        
        if (dayOfWeek === 1 && mskNow.getUTCHours() < 0 || (mskNow.getUTCHours() === 0 && mskNow.getUTCMinutes() < 1)) {
            // Сегодня понедельник, но ещё не наступило 00:01
            targetDate = new Date(Date.UTC(year, month, date, 0, 1, 0));
        } else if (dayOfWeek === 1 && mskNow.getUTCHours() >= 0 && mskNow.getUTCMinutes() >= 1) {
            // Сегодня понедельник, но время уже после 00:01 — следующий понедельник
            const daysUntilNext = 7;
            targetDate = new Date(Date.UTC(year, month, date + daysUntilNext, 0, 1, 0));
        } else {
            // Не понедельник
            let daysUntilMonday = (8 - dayOfWeek) % 7;
            if (daysUntilMonday === 0) daysUntilMonday = 7;
            targetDate = new Date(Date.UTC(year, month, date + daysUntilMonday, 0, 1, 0));
        }
        
        return targetDate;
    }
    
    // Отрисовка сетки
    function renderGrid() {
        if (!gridEl) return;
        let html = '';
        
        for (let i = 0; i < TOTAL_CARDS; i++) {
            const card = currentCards[i] || [0, 0, 0, 0];
            
            const getColorClass = (num) => {
                if (RED_NUMBERS.has(num)) return 'red';
                if (BLUE_NUMBERS.has(num)) return 'blue';
                return 'green';
            };
            
            html += `
                <div class="card">
                    <div class="numbers">
                        <div class="number-row top-position">
                            <div class="number ${getColorClass(card[0])}">${card[0]}</div>
                        </div>
                        <div class="number-row">
                            <div class="number ${getColorClass(card[1])}">${card[1]}</div>
                            <div class="number ${getColorClass(card[2])}">${card[2]}</div>
                            <div class="number ${getColorClass(card[3])}">${card[3]}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        gridEl.innerHTML = html;
        
        const allNumbers = document.querySelectorAll('.number');
        allNumbers.forEach(num => {
            num.classList.add('flash');
            setTimeout(() => num.classList.remove('flash'), 250);
        });
    }
    
    function updateStepDisplay() {
        if (stepDisplay) stepDisplay.innerText = `${currentStep}/${TOTAL_STEPS_IN_CYCLE}`;
    }
    
    // Московское время
    function updateMoscowClock() {
        const now = new Date();
        const msk = new Date(now.getTime() + (3 * 60 * 60 * 1000));
        const hh = String(msk.getUTCHours()).padStart(2, '0');
        const mm = String(msk.getUTCMinutes()).padStart(2, '0');
        const ss = String(msk.getUTCSeconds()).padStart(2, '0');
        if (mskClock) mskClock.innerText = `${hh}:${mm}:${ss}`;
    }
    
    // Инициализация приложения
    function init() {
        // Генерируем начальный шаг
        const { cards, key } = generateUniqueStepForCycle();
        currentCards = cards.map(c => [...c]);
        stepHistory.push(key);
        currentStep = 1;
        
        renderGrid();
        updateStepDisplay();
        
        // Запускаем часы
        updateMoscowClock();
        setInterval(updateMoscowClock, 1000);
        
        // Планируем следующие шаги
        scheduleNextSteps();
    }
    
    init();
</script>
</body>
</html>
